<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <!-- 📍 Meta Tags Essenciais -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Crie sua conta na plataforma Enterprise Course">
    
    <title>Cadastro - Enterprise Course</title>
    
    <!-- 🎨 Carregamento de Estilos CSS
         📍 Ordem de carregamento importante para cascata CSS funcionar
    -->
    <link rel="stylesheet" href="/enterprise-course/frontend/assets/css/style.css">
    <link rel="stylesheet" href="/enterprise-course/frontend/assets/css/responsive.css" media="screen">
</head>
<body class="auth-page signup-page">
    <div id="app">
        <!-- NAVBAR SIMPLES PARA SIGNUP -->
        <nav class="navbar navbar-simple">
            <div class="container">
                <a href="/" class="logo">
                    <span>Enterprise Course</span>
                </a>
            </div>
        </nav>

        <!-- FORM SIGNUP -->
        <main class="auth-container">
            <div class="auth-form">
                <h1>Criar Conta</h1>
                <p class="subtitle">Cadastre-se para começar</p>

                <form id="signupForm" onsubmit="handleSignup(event)">
                    <div class="form-group">
                        <label for="name">Nome Completo</label>
                        <input 
                            type="text" 
                            id="name" 
                            name="name" 
                            placeholder="João da Silva" 
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="email">Email</label>
                        <input 
                            type="email" 
                            id="email" 
                            name="email" 
                            placeholder="seu@email.com" 
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="password">Senha</label>
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            placeholder="••••••••" 
                            minlength="6"
                            required
                        >
                        <small>Mínimo 6 caracteres</small>
                    </div>

                    <div class="form-group">
                        <label for="password_confirm">Confirmar Senha</label>
                        <input 
                            type="password" 
                            id="password_confirm" 
                            name="password_confirm" 
                            placeholder="••••••••" 
                            required
                        >
                    </div>

                    <div class="form-group checkbox">
                        <input type="checkbox" id="agreeTerms" name="agreeTerms" required>
                        <label for="agreeTerms">
                            Concordo com os <a href="#">Termos de Serviço</a>
                        </label>
                    </div>

                    <button type="submit" class="btn btn-primary btn-block">
                        Criar Conta
                    </button>

                    <div class="divider">ou</div>

                    <button type="button" class="btn btn-social btn-block google">
                        🔵 Cadastrar com Google
                    </button>
                </form>

                <div class="auth-footer">
                    <p>
                        Já tem uma conta? 
                        <a href="/login">Fazer login</a>
                    </p>
                </div>
            </div>
        </main>

        <!-- RODAPÉ -->
        <footer class="footer footer-simple">
            <p>&copy; 2024 Enterprise Course Platform</p>
        </footer>
    </div>

    <script src="/assets/js/utils.js"></script>
    <script>
        async function handleSignup(event) {
            event.preventDefault();
            
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const passwordConfirm = document.getElementById('password_confirm').value;

            // Validar senhas
            if (password !== passwordConfirm) {
                showNotification('As senhas não correspondem', 'error');
                return;
            }

            try {
                const response = await fetch('/api/auth/signup', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ name, email, password })
                });

                const data = await response.json();

                if (data.success) {
                    showNotification('Conta criada com sucesso! Redirecionando...', 'success');
                    
                    // Redirecionar para login após 1 segundo
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 1000);
                } else {
                    showNotification(data.message || 'Erro ao criar conta', 'error');
                }
            } catch (error) {
                showNotification('Erro ao conectar ao servidor', 'error');
                console.error('Signup error:', error);
            }
        }
    </script>
</body>
</html>

<canvas id="chart"></canvas>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
   fetch('http://localhost:3000/api/admin/cursos')
      .then(r => r.json())
      .then(data => {
         new Chart(document.getElementById('chart'), {
            type: 'bar',
            data: {
               labels: data.map(c => c.titulo),
               datasets: [{ data: data.map(() => 1) }]
            }
         });
      });
</script>
